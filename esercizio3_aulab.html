<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,300;1,300&family=Roboto+Mono:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        body{
            height: 2000px;
        }
        h1{

  font-family: "Roboto Mono", monospace;
  font-optical-sizing: auto;
  font-weight: 700;
  font-style: normal;
}
h1, h2{
    color: aqua;
}


.immagine{
    height: 60vh;
    background-image: url(https://picsum.photos/1200/300);
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    background-attachment: fixed;
}

.card{
    border: red solid 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    height: 40vh;
    background-color: rgb(58, 58, 58);
}

p{



  font-family: "Roboto Condensed", sans-serif;
  font-optical-sizing: auto;
  font-weight: 300;
  font-style: normal;
  color: white;

}

.bottone{
    background-color: black;
    color: white;
    padding: 10px;
    border-radius: 5px;

}

.bottone:hover{
    background-color: red;
    color: black;
}


    </style>
</head>
<body>

    <div class="immagine">


    </div>

    <div class="card">
    <h1>Questo è il testo principale</h1>
    <h2>Questo è il sottotitolo</h2>
    <p>questo è il paragrafo</p>
    <button class="bottone">cliccami</button>
    </div>


    
</body>
</html>
